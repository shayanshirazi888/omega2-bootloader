<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>PGP | Flashing...</title>
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; text-align: center; padding-top: 15vh; color: #2c3e50; margin: 0; }
        .panel { background: #ffffff; padding: 50px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); display: inline-block; border-top: 5px solid #007bff; }
        .spinner { border: 5px solid #ecf0f1; border-top: 5px solid #007bff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 25px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { margin: 0 0 10px 0; color: #1a252f; font-weight: 800; letter-spacing: 1px; }
        p { color: #7f8c8d; font-size: 15px; margin-bottom: 20px; }
        .warn { color: #e74c3c; font-weight: bold; background: #fdf2f2; padding: 10px; border-radius: 4px; display: inline-block; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="panel">
        <div class="spinner"></div>
        <h2>WRITING DATA...</h2>
        <p>Please wait. The device will reboot automatically when finished.</p>
        <div class="warn">DO NOT REMOVE POWER</div>
    </div>
</body>
</html>

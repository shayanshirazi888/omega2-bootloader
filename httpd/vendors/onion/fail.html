<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>PGP | System Error</title>
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; text-align: center; padding-top: 15vh; color: #2c3e50; margin: 0; }
        .panel { background: #ffffff; padding: 50px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); display: inline-block; border-top: 5px solid #e74c3c; max-width: 400px; }
        h2 { margin: 0 0 10px 0; color: #e74c3c; font-weight: 800; letter-spacing: 1px; }
        p { color: #7f8c8d; font-size: 14px; margin-bottom: 30px; line-height: 1.5; }
        .btn { display: inline-block; padding: 12px 25px; background: #2c3e50; color: #ffffff; text-decoration: none; border-radius: 6px; font-weight: bold; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .btn:hover { background: #1a252f; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>OPERATION FAILED</h2>
        <p>The firmware file is invalid/corrupted, or the page does not exist. Operation aborted.</p>
        <a href="javascript:history.back()" class="btn">&larr; Go Back</a>
    </div>
</body>
</html>
